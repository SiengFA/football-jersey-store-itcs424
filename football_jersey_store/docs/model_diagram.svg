<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#374151"/>
    </marker>
    <marker id="diamond" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto">
      <path d="M0,7 L7,0 L14,7 L7,14 z" fill="#fff" stroke="#374151" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#111">
    Football Jersey Store — Class Diagram
  </text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#6b7280">
    ITCS424 Mobile Application Development · Flutter
  </text>

  <!-- ===== Product (Model) ===== -->
  <rect x="40" y="100" width="320" height="380" rx="8" fill="#fef3c7" stroke="#92400e" stroke-width="2"/>
  <rect x="40" y="100" width="320" height="36" rx="8" fill="#92400e"/>
  <text x="200" y="124" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">«model» Product</text>

  <!-- Attributes -->
  <line x1="40" y1="136" x2="360" y2="136" stroke="#92400e" stroke-width="1"/>
  <text x="55" y="156" font-size="12" fill="#111">+ id : String</text>
  <text x="55" y="174" font-size="12" fill="#111">+ name : String</text>
  <text x="55" y="192" font-size="12" fill="#111">+ price : double</text>
  <text x="55" y="210" font-size="12" fill="#111">+ description : String</text>
  <text x="55" y="228" font-size="12" fill="#111">+ isFavorite : bool</text>
  <text x="55" y="246" font-size="12" fill="#111">+ imageUrl : String</text>
  <text x="55" y="264" font-size="12" fill="#111">+ team : String</text>
  <text x="55" y="282" font-size="12" fill="#111">+ size : String</text>
  <text x="55" y="300" font-size="12" fill="#111">+ season : String</text>
  <text x="55" y="318" font-size="12" fill="#111">+ playerName : String</text>
  <text x="55" y="336" font-size="12" fill="#111">+ jerseyType : String</text>
  <text x="55" y="354" font-size="12" fill="#111">+ isAuthentic : bool</text>
  <text x="55" y="372" font-size="12" fill="#111">+ stockQuantity : int</text>

  <!-- Methods -->
  <line x1="40" y1="385" x2="360" y2="385" stroke="#92400e" stroke-width="1"/>
  <text x="55" y="405" font-size="12" fill="#111">+ Product({...})  «constructor»</text>
  <text x="55" y="423" font-size="12" fill="#111">+ toggleFavorite() : void</text>
  <text x="55" y="441" font-size="12" fill="#111">+ inStock : bool  «getter»</text>

  <!-- ===== ProductCard (Widget) ===== -->
  <rect x="430" y="100" width="320" height="240" rx="8" fill="#dbeafe" stroke="#1e40af" stroke-width="2"/>
  <rect x="430" y="100" width="320" height="36" rx="8" fill="#1e40af"/>
  <text x="590" y="124" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">«widget» ProductCard</text>
  <text x="590" y="152" text-anchor="middle" font-size="11" fill="#1e3a8a" font-style="italic">extends StatefulWidget</text>

  <line x1="430" y1="160" x2="750" y2="160" stroke="#1e40af" stroke-width="1"/>
  <text x="445" y="180" font-size="12" fill="#111">+ product : Product</text>
  <text x="445" y="198" font-size="12" fill="#111">- _state : _ProductCardState</text>

  <line x1="430" y1="210" x2="750" y2="210" stroke="#1e40af" stroke-width="1"/>
  <text x="445" y="230" font-size="12" fill="#111">+ ProductCard({product})  «constructor»</text>
  <text x="445" y="248" font-size="12" fill="#111">+ createState() : State</text>
  <text x="445" y="266" font-size="12" fill="#111">+ build(context) : Widget</text>
  <text x="445" y="284" font-size="12" fill="#111">  · renders Image, Card, Chips</text>
  <text x="445" y="302" font-size="12" fill="#111">  · handles favorite toggle</text>
  <text x="445" y="320" font-size="12" fill="#111">  · shows AUTHENTIC / out-of-stock</text>

  <!-- ===== ProductListScreen ===== -->
  <rect x="430" y="380" width="320" height="200" rx="8" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <rect x="430" y="380" width="320" height="36" rx="8" fill="#166534"/>
  <text x="590" y="404" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">«screen» ProductListScreen</text>
  <text x="590" y="432" text-anchor="middle" font-size="11" fill="#14532d" font-style="italic">extends StatelessWidget</text>

  <line x1="430" y1="440" x2="750" y2="440" stroke="#166534" stroke-width="1"/>
  <text x="445" y="460" font-size="12" fill="#111">+ categoryName : String</text>
  <text x="445" y="478" font-size="12" fill="#111">+ products : List&lt;Product&gt;</text>

  <line x1="430" y1="490" x2="750" y2="490" stroke="#166534" stroke-width="1"/>
  <text x="445" y="510" font-size="12" fill="#111">+ ProductListScreen({...})</text>
  <text x="445" y="528" font-size="12" fill="#111">+ build(context) : Widget</text>
  <text x="445" y="546" font-size="12" fill="#111">  · GridView.builder with ProductCard</text>
  <text x="445" y="564" font-size="12" fill="#111">  · FloatingActionButton (favorites count)</text>

  <!-- ===== FootballJerseyApp ===== -->
  <rect x="820" y="100" width="240" height="200" rx="8" fill="#fce7f3" stroke="#9d174d" stroke-width="2"/>
  <rect x="820" y="100" width="240" height="36" rx="8" fill="#9d174d"/>
  <text x="940" y="124" text-anchor="middle" font-size="15" font-weight="bold" fill="#fff">FootballJerseyApp</text>
  <text x="940" y="152" text-anchor="middle" font-size="11" fill="#831843" font-style="italic">extends StatelessWidget</text>

  <line x1="820" y1="160" x2="1060" y2="160" stroke="#9d174d" stroke-width="1"/>
  <text x="835" y="180" font-size="12" fill="#111">(no fields)</text>

  <line x1="820" y1="195" x2="1060" y2="195" stroke="#9d174d" stroke-width="1"/>
  <text x="835" y="215" font-size="12" fill="#111">+ build(context) : MaterialApp</text>
  <text x="835" y="233" font-size="12" fill="#111">- _getSampleProducts()</text>
  <text x="835" y="251" font-size="12" fill="#111">  : List&lt;Product&gt;</text>

  <!-- main() function -->
  <rect x="820" y="340" width="240" height="80" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  <text x="940" y="365" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">main()</text>
  <text x="835" y="390" font-size="12" fill="#111">runApp(FootballJerseyApp())</text>
  <text x="835" y="408" font-size="11" fill="#6b7280" font-style="italic">app entry point</text>

  <!-- ===== Relationships ===== -->
  <!-- ProductCard -uses--> Product -->
  <line x1="430" y1="200" x2="360" y2="240" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="370" y="195" font-size="11" fill="#374151" font-style="italic">«uses»</text>

  <!-- ProductListScreen -aggregates--> Product -->
  <line x1="430" y1="470" x2="360" y2="350" stroke="#374151" stroke-width="1.8" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
  <text x="365" y="430" font-size="11" fill="#374151" font-style="italic">List&lt;Product&gt;</text>

  <!-- ProductListScreen -uses--> ProductCard -->
  <line x1="590" y1="380" x2="590" y2="340" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="600" y="365" font-size="11" fill="#374151" font-style="italic">creates</text>

  <!-- FootballJerseyApp -home--> ProductListScreen -->
  <line x1="820" y1="250" x2="750" y2="430" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="765" y="335" font-size="11" fill="#374151" font-style="italic">home</text>

  <!-- main -runs--> FootballJerseyApp -->
  <line x1="940" y1="340" x2="940" y2="305" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="950" y="328" font-size="11" fill="#374151" font-style="italic">runApp</text>

  <!-- Legend -->
  <rect x="40" y="600" width="1020" height="100" rx="6" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="60" y="625" font-size="13" font-weight="bold" fill="#111">Legend</text>
  <rect x="60" y="640" width="20" height="14" fill="#fef3c7" stroke="#92400e"/>
  <text x="90" y="652" font-size="12" fill="#111">Model (data class)</text>
  <rect x="240" y="640" width="20" height="14" fill="#dbeafe" stroke="#1e40af"/>
  <text x="270" y="652" font-size="12" fill="#111">Widget (StatefulWidget)</text>
  <rect x="450" y="640" width="20" height="14" fill="#dcfce7" stroke="#166534"/>
  <text x="480" y="652" font-size="12" fill="#111">Screen (StatelessWidget)</text>
  <rect x="650" y="640" width="20" height="14" fill="#fce7f3" stroke="#9d174d"/>
  <text x="680" y="652" font-size="12" fill="#111">App root</text>

  <line x1="60" y1="675" x2="100" y2="675" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="110" y="679" font-size="12" fill="#111">uses / creates</text>
  <line x1="240" y1="675" x2="280" y2="675" stroke="#374151" stroke-width="1.8" marker-start="url(#diamond)" marker-end="url(#arrow)"/>
  <text x="290" y="679" font-size="12" fill="#111">aggregation (has-a List)</text>
</svg>
